<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahne Üretim Yönetim Sistemi</title>
    <style>
        :root {
            --bg-dark: #0f1115; --bg-panel: #1a1d24; --bg-card: #22262f;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --accent: #3b82f6; --accent-hover: #2563eb;
            --border: #334155; --danger: #ef4444;
            --todo: #f43f5e; --doing: #f59e0b; --done: #10b981;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        h1 { margin: 0; font-size: 22px; font-weight: 600; }
        
        button { cursor: pointer; border: none; font-family: inherit; border-radius: 6px; font-weight: 500; transition: 0.2s; }
        .btn-primary { background-color: var(--accent); color: white; padding: 10px 18px; }
        .btn-primary:hover { background-color: var(--accent-hover); }
        .btn-back { background-color: transparent; color: var(--text-muted); padding: 8px 12px; border: 1px solid var(--border); }
        .btn-back:hover { background-color: var(--bg-panel); color: white; }
        .btn-danger { background-color: transparent; color: var(--danger); padding: 5px 10px; border: 1px solid var(--danger); font-size: 12px; }

        /* Dialog / Popup Formları */
        dialog { background-color: var(--bg-card); color: var(--text-main); border: 1px solid var(--border); border-radius: 12px; padding: 25px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        dialog::backdrop { background: rgba(0,0,0,0.7); }
        input, select { width: 100%; box-sizing: border-box; padding: 10px; margin: 8px 0 20px 0; background: var(--bg-dark); color: white; border: 1px solid var(--border); border-radius: 6px; }
        .dialog-actions { display: flex; justify-content: flex-end; gap: 10px; }

        /* Görünümler */
        #productions-view { display: block; }
        #single-production-view { display: none; }

        /* Prodüksiyon Kartları */
        .production-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .prod-card { background-color: var(--bg-panel); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
        .prod-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .prod-title { font-size: 20px; font-weight: 600; margin: 0; }
        
        .btn-enter { width: 100%; background-color: var(--bg-card); color: white; padding: 12px; border: 1px solid var(--border); margin-top: 15px; }
        .btn-enter:hover { border-color: var(--accent); color: var(--accent); }

        /* Kanban Panosu */
        .kanban { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; }
        .column { flex: 1; min-width: 300px; background: var(--bg-panel); border-radius: 10px; padding: 15px; border: 1px solid var(--border); min-height: 400px; }
        .col-header { font-size: 14px; font-weight: 600; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid; }
        
        .task { background: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: grab; }
        .task:active { cursor: grabbing; opacity: 0.7; }
        .task-title { margin: 0 0 8px 0; font-size: 15px; }
        .task-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); }
        .tag { padding: 3px 8px; border-radius: 4px; color: white; font-weight: 500; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🎭 Sahne Üretim Yönetimi</h1>
            <button id="btn-new-prod" class="btn-primary" onclick="document.getElementById('modal-add-prod').showModal()">+ Yeni Oyun Ekle</button>
        </header>

        <div id="productions-view">
            <h2 style="font-size: 18px; color: var(--text-muted); margin-bottom: 20px;">Aktif Oyunlar</h2>
            <div class="production-grid" id="prod-list">
                </div>
        </div>

        <div id="single-production-view">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <button class="btn-back" onclick="showDashboard()">← Geri</button>
                    <h2 id="current-prod-title" style="margin: 0; font-size: 24px;">Oyun Adı</h2>
                </div>
                <button class="btn-primary" onclick="document.getElementById('modal-add-task').showModal()">+ Atölye İşi Ekle</button>
            </div>

            <div class="kanban">
                <div class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="col-header" style="border-color: var(--todo);">📋 Yapılacaklar</div>
                    <div id="todo-tasks"></div>
                </div>
                <div class="column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="col-header" style="border-color: var(--doing);">⏳ Üretimde</div>
                    <div id="doing-tasks"></div>
                </div>
                <div class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <div class="col-header" style="border-color: var(--done);">✅ Tamamlandı</div>
                    <div id="done-tasks"></div>
                </div>
            </div>
        </div>
    </div>

    <dialog id="modal-add-prod">
        <h3 style="margin-top: 0;">Yeni Oyun Ekle</h3>
        <label>Oyun Adı:</label>
        <input type="text" id="input-prod-name" placeholder="Örn: Nihayet Makamı">
        <div class="dialog-actions">
            <button class="btn-back" onclick="document.getElementById('modal-add-prod').close()">İptal</button>
            <button class="btn-primary" onclick="addProduction()">Kaydet</button>
        </div>
    </dialog>

    <dialog id="modal-add-task">
        <h3 style="margin-top: 0;">Yeni İş Ekle</h3>
        <label>İş / Çizim Tanımı:</label>
        <input type="text" id="input-task-name" placeholder="Örn: Sabriye - Broşür Tasarımı">
        <label>Atölye Seçimi:</label>
        <select id="input-task-type">
            <option value="Tasarım|#42a5f5">🎨 Tasarım / Çizim</option>
            <option value="Kostüm|#ec407a">🧵 Kostüm & Bezleme</option>
            <option value="Marangoz|#8d6e63">🪵 Marangoz</option>
            <option value="Demir|#78909c">🔩 Demir</option>
        </select>
        <div class="dialog-actions">
            <button class="btn-back" onclick="document.getElementById('modal-add-task').close()">İptal</button>
            <button class="btn-primary" onclick="addTask()">İşi Ekle</button>
        </div>
    </dialog>

    <script>
        // --- VERİTABANI VE YÖNETİM ---
        let appData = JSON.parse(localStorage.getItem('sahneVerileri2')) || { productions: [] };
        let activeProdId = null;

        function saveData() { localStorage.setItem('sahneVerileri2', JSON.stringify(appData)); }

        // --- ANA SAYFA YÜKLEME ---
        function renderDashboard() {
            const list = document.getElementById('prod-list');
            list.innerHTML = '';
            
            if (appData.productions.length === 0) {
                list.innerHTML = '<p style="color: var(--text-muted);">Henüz eklenmiş bir oyun yok. Yukarıdan Yeni Oyun Ekle butonuna basın.</p>';
                return;
            }

            appData.productions.forEach(prod => {
                list.innerHTML += `
                    <div class="prod-card">
                        <div class="prod-header">
                            <h3 class="prod-title">${prod.name}</h3>
                            <button class="btn-danger" onclick="deleteProd(${prod.id})">Sil</button>
                        </div>
                        <p style="color: var(--text-muted); font-size: 14px;">Toplam İş: ${prod.tasks.length}</p>
                        <button class="btn-enter" onclick="openProd(${prod.id})">Prodüksiyonu Yönet →</button>
                    </div>
                `;
            });
        }

        // --- OYUN EKLEME ---
        function addProduction() {
            const name = document.getElementById('input-prod-name').value;
            if (!name) return;
            appData.productions.push({ id: Date.now(), name: name, tasks: [] });
            saveData();
            document.getElementById('input-prod-name').value = '';
            document.getElementById('modal-add-prod').close();
            renderDashboard();
        }

        function deleteProd(id) {
            if(confirm("Bu oyunu tamamen silmek istiyor musunuz?")) {
                appData.productions = appData.productions.filter(p => p.id !== id);
                saveData(); renderDashboard();
            }
        }

        // --- OYUN İÇİNE GİRİŞ VE ÇIKIŞ ---
        function openProd(id) {
            activeProdId = id;
            const prod = appData.productions.find(p => p.id === id);
            document.getElementById('current-prod-title').innerText = prod.name;
            
            document.getElementById('productions-view').style.display = 'none';
            document.getElementById('btn-new-prod').style.display = 'none';
            document.getElementById('single-production-view').style.display = 'block';
            
            renderKanban();
        }

        function showDashboard() {
            activeProdId = null;
            document.getElementById('single-production-view').style.display = 'none';
            document.getElementById('productions-view').style.display = 'block';
            document.getElementById('btn-new-prod').style.display = 'block';
            renderDashboard();
        }

        // --- KANBAN VE İŞ YÖNETİMİ ---
        function renderKanban() {
            const prod = appData.productions.find(p => p.id === activeProdId);
            document.getElementById('todo-tasks').innerHTML = '';
            document.getElementById('doing-tasks').innerHTML = '';
            document.getElementById('done-tasks').innerHTML = '';

            prod.tasks.forEach(task => {
                const typeData = task.type.split('|');
                const html = `
                    <div class="task" draggable="true" ondragstart="drag(event, ${task.id})" id="task-${task.id}">
                        <h4 class="task-title">${task.name}</h4>
                        <div class="task-meta">
                            <span class="tag" style="background-color: ${typeData[1]}">${typeData[0]}</span>
                            <button class="btn-danger" style="border:none;" onclick="deleteTask(${task.id})">Sil</button>
                        </div>
                    </div>
                `;
                document.getElementById(task.status + '-tasks').innerHTML += html;
            });
        }

        function addTask() {
            const name = document.getElementById('input-task-name').value;
            const type = document.getElementById('input-task-type').value;
            if (!name) return;

            const prod = appData.productions.find(p => p.id === activeProdId);
            prod.tasks.push({ id: Date.now(), name: name, type: type, status: 'todo' });
            
            saveData();
            document.getElementById('input-task-name').value = '';
            document.getElementById('modal-add-task').close();
            renderKanban();
        }

        function deleteTask(taskId) {
            const prod = appData.productions.find(p => p.id === activeProdId);
            prod.tasks = prod.tasks.filter(t => t.id !== taskId);
            saveData(); renderKanban();
        }

        // --- SÜRÜKLE BIRAK (DRAG & DROP) ---
        function allowDrop(ev) { ev.preventDefault(); }
        function drag(ev, taskId) { ev.dataTransfer.setData("taskId", taskId); }
        function drop(ev) {
            ev.preventDefault();
            const taskId = parseInt(ev.dataTransfer.getData("taskId"));
            const columnId = ev.target.closest('.column').id; // todo, doing, done
            
            const prod = appData.productions.find(p => p.id === activeProdId);
            const task = prod.tasks.find(t => t.id === taskId);
            task.status = columnId; // Durumu güncelle
            
            saveData();
            renderKanban();
        }

        // Başlangıç
        renderDashboard();
    </script>
</body>
</html>
