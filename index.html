<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sahne Üretim Takip Sistemi - Tiyatro Prodüksiyon Yönetim">
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Font loading with display=swap for better performance -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Sahne Üretim Takip Sistemi</title>
    <style>
        /* ===== CSS RESET & BASE STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Root color variables for light theme */
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --bg-main: #fafafa;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #efefef;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
            --success: #34c759;
            --success-light: #e8f5e9;
            --warning: #ff9500;
            --warning-light: #fff3e0;
            --info: #007aff;
            --info-light: #e3f2fd;
            --danger: #ff3b30;
            --danger-light: #ffebee;
            --shadow: rgba(0, 0, 0, 0.05);
            --overlay: rgba(0, 0, 0, 0.3);
        }

        /* Dark theme color variables */
        [data-theme="dark"] {
            --primary: #a78bfa;
            --primary-dark: #9333ea;
            --primary-light: #c4b5fd;
            --bg-main: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --border: #38383a;
            --success: #30d158;
            --success-light: #1e3a28;
            --warning: #ff9f0a;
            --warning-light: #3d2f1f;
            --info: #0a84ff;
            --info-light: #1e2b3d;
            --danger: #ff453a;
            --danger-light: #3d1f1f;
            --shadow: rgba(0, 0, 0, 0.3);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            /* Only apply transition to body for theme changes */
            transition: background-color 0.3s ease-out, color 0.3s ease-out;
        }

        /* ===== LAYOUT ===== */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1em;
            color: var(--text-secondary);
        }

        .theme-toggle {
            position: absolute;
            top: 40px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            /* Only transition relevant properties */
            transition: background-color 0.2s ease-out, border-color 0.2s ease-out;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
        }

        /* ===== VIEW MANAGEMENT ===== */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* ===== BUTTONS ===== */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease-out, border-color 0.2s ease-out;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        .btn {
            padding: 10px 24px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease-out;
            border-radius: 8px;
        }

        .btn:hover {
            background: var(--bg-secondary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 0.85em;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-primary);
            cursor: pointer;
            transition: background-color 0.2s ease-out;
            font-weight: 500;
        }

        .btn-small:hover {
            background: var(--bg-secondary);
        }

        .btn-delete {
            color: var(--danger);
            border-color: var(--danger-light);
        }

        .btn-delete:hover {
            background: var(--danger-light);
        }

        /* ===== PRODUCTION CARDS ===== */
        .productions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .production-card {
            background: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out, border-color 0.3s ease-out;
            box-shadow: 0 2px 12px var(--shadow);
            cursor: pointer;
            will-change: transform;
        }

        .production-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--primary);
        }

        .production-poster {
            width: 100%;
            height: 400px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            overflow: hidden;
        }

        .production-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Lazy loading handled via HTML */
        }

        .production-card-content {
            padding: 24px;
        }

        .production-card h3 {
            font-size: 1.6em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .production-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .production-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            color: var(--text-secondary);
        }

        .production-meta-item strong {
            color: var(--text-primary);
            min-width: 90px;
        }

        .pending-tasks-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--info-light);
            color: var(--info);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            margin-top: 12px;
        }

        .production-actions {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        /* ===== PRODUCTION DETAIL ===== */
        .production-detail-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            padding: 32px;
            color: white;
            margin-bottom: 30px;
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }

        .production-detail-poster {
            width: 200px;
            height: 280px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            flex-shrink: 0;
            border: 3px solid var(--border);
            overflow: hidden;
        }

        .production-detail-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 9px;
        }

        .production-detail-info {
            flex: 1;
        }

        .production-detail-info h2 {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .production-detail-info .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .meta-item {
            background: var(--bg-tertiary);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .meta-item label {
            font-size: 0.85em;
            opacity: 0.8;
            display: block;
            margin-bottom: 4px;
        }

        .meta-item value {
            font-size: 1.1em;
            font-weight: 600;
        }

        /* ===== TABS ===== */
        .production-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .production-tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s ease-out;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
        }

        .production-tab:hover {
            color: var(--text-primary);
        }

        .production-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .production-tab-content {
            display: none;
        }

        .production-tab-content.active {
            display: block;
        }

        /* ===== WORKSHOP ITEMS ===== */
        .workshop-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .workshop-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: box-shadow 0.2s ease-out;
        }

        .workshop-item:hover {
            box-shadow: 0 4px 12px var(--shadow);
        }

        .workshop-item h4 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .workshop-status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .workshop-status-beklemede {
            background: var(--warning-light);
            color: var(--warning);
        }

        .workshop-status-devam {
            background: var(--info-light);
            color: var(--info);
        }

        .workshop-status-tamamlandi {
            background: var(--success-light);
            color: var(--success);
        }

        .workshop-meta {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            color: var(--text-secondary);
            margin: 12px 0;
        }

        .workshop-photos {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .workshop-photo {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: transform 0.2s ease-out;
        }

        .workshop-photo:hover {
            transform: scale(1.05);
        }

        .workshop-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .workshop-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            /* Use will-change sparingly */
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-main);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5em;
            color: var(--text-secondary);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background-color 0.2s ease-out, color 0.2s ease-out;
            border: none;
            background: transparent;
        }

        .close-modal:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .modal h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95em;
            transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s ease-out, background-color 0.2s ease-out;
            background: var(--bg-secondary);
        }

        .file-upload:hover {
            border-color: var(--primary);
            background: var(--bg-tertiary);
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .photo-preview {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .photo-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .photo-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .photo-preview-item .remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border: none;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        /* ===== FILE CARDS ===== */
        .file-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: box-shadow 0.2s ease-out;
        }

        .file-card:hover {
            box-shadow: 0 4px 12px var(--shadow);
        }

        .file-card h4 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .file-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .file-tag {
            padding: 4px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--text-primary);
        }

        /* ===== RESPONSIVE DESIGN ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .productions-grid {
                grid-template-columns: 1fr;
            }

            .production-detail-header {
                flex-direction: column;
            }

            .production-detail-poster {
                width: 100%;
                height: 300px;
            }

            .production-tabs {
                overflow-x: auto;
            }

            .theme-toggle {
                position: static;
                margin-top: 16px;
            }

            .modal-content {
                width: 95%;
                padding: 24px;
            }
        }

        /* ===== PERFORMANCE OPTIMIZATIONS ===== */
        /* Reduce motion for users who prefer it */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* High DPI displays */
        @media (min-resolution: 2dppx) {
            .production-card,
            .workshop-item,
            .file-card {
                border-width: 1px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>SAHNE ÜRETİM TAKİP</h1>
            <p>Tiyatro Prodüksiyon Yönetim Sistemi</p>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>
                <span id="themeText">Karanlık Mod</span>
            </div>
        </header>
        
        <!-- Main View: Productions List -->
        <div id="mainView" class="view active">
            <div style="margin-bottom: 24px;">
                <button class="btn btn-primary" onclick="openModal('projectModal')">
                    <span>+ Yeni Oyun Ekle</span>
                </button>
            </div>
            
            <div class="productions-grid" id="productionsGrid"></div>
        </div>
        
        <!-- Production Detail View -->
        <div id="productionDetailView" class="view">
            <button class="back-button" onclick="goToMainView()">
                ← Ana Sayfaya Dön
            </button>
            
            <div class="production-detail-header" id="productionDetailHeader">
                <!-- Will be populated dynamically -->
            </div>
            
            <div class="production-tabs">
                <button class="production-tab active" data-tab="demir">🔩 Demir</button>
                <button class="production-tab" data-tab="marangoz">🪵 Marangoz</button>
                <button class="production-tab" data-tab="bezleme">🧵 Bezleme</button>
                <button class="production-tab" data-tab="butafor">🎨 Butafor</button>
                <button class="production-tab" data-tab="boya">🖌️ Boya</button>
                <button class="production-tab" data-tab="procurement">🛒 Satınalma</button>
                <button class="production-tab" data-tab="files">📁 Dosyalar</button>
            </div>
            
            <!-- Demir Tab -->
            <div id="demir" class="production-tab-content active">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Demir')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="demirList"></div>
            </div>
            
            <!-- Marangoz Tab -->
            <div id="marangoz" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Marangoz')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="marangozList"></div>
            </div>
            
            <!-- Bezleme Tab -->
            <div id="bezleme" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Bezleme')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="bezlemeList"></div>
            </div>
            
            <!-- Butafor Tab -->
            <div id="butafor" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Butafor')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="butaforList"></div>
            </div>
            
            <!-- Boya Tab -->
            <div id="boya" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Boya')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="boyaList"></div>
            </div>
            
            <!-- Procurement Tab -->
            <div id="procurement" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openModal('procurementModal')">
                        <span>+ Satınalma Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="procurementList"></div>
            </div>
            
            <!-- Files Tab -->
            <div id="files" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openModal('fileModal')">
                        <span>+ Dosya Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="filesList"></div>
            </div>
        </div>
    </div>

    <!-- Modals will be added here -->
    
    <script>
        // ===== STATE MANAGEMENT =====
        let currentProject = null;
        let currentProjectPoster = '';
        let currentPhotos = [];
        let currentTheme = localStorage.getItem('theme') || 'light';
        let currentWorkshopType = '';
        
        // ===== DATA STORAGE =====
        const storage = {
            projects: JSON.parse(localStorage.getItem('projects')) || [],
            workshops: JSON.parse(localStorage.getItem('workshops')) || [],
            procurements: JSON.parse(localStorage.getItem('procurements')) || [],
            files: JSON.parse(localStorage.getItem('files')) || [],
            workshopPhotos: JSON.parse(localStorage.getItem('workshopPhotos')) || {},
            projectPosters: JSON.parse(localStorage.getItem('projectPosters')) || {}
        };
        
        // ===== THEME MANAGEMENT =====
        function initTheme() {
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').textContent = '☀️';
                document.getElementById('themeText').textContent = 'Aydınlık Mod';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeIcon').textContent = '🌙';
                document.getElementById('themeText').textContent = 'Karanlık Mod';
            }
        }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('themeIcon').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
            document.getElementById('themeText').textContent = currentTheme === 'dark' ? 'Aydınlık Mod' : 'Karanlık Mod';
            localStorage.setItem('theme', currentTheme);
        }
        
        window.toggleTheme = toggleTheme;
        
        // ===== VIEW NAVIGATION =====
        function goToMainView() {
            currentProject = null;
            document.getElementById('mainView').classList.add('active');
            document.getElementById('productionDetailView').classList.remove('active');
            renderProductions();
        }
        
        function showProductionDetail(projectId) {
            const project = storage.projects.find(p => p.id == projectId);
            if (!project) return;
            
            currentProject = projectId;
            
            document.getElementById('mainView').classList.remove('active');
            document.getElementById('productionDetailView').classList.add('active');
            
            renderProductionDetail(project);
            renderAllWorkshops();
            renderProcurements();
            renderFiles();
            
            // Reset to first tab
            document.querySelectorAll('.production-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.production-tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('.production-tab[data-tab="demir"]').classList.add('active');
            document.getElementById('demir').classList.add('active');
        }
        
        window.goToMainView = goToMainView;
        window.showProductionDetail = showProductionDetail;
        
        // ===== TAB SWITCHING =====
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('production-tab')) {
                const tab = e.target.dataset.tab;
                document.querySelectorAll('.production-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.production-tab-content').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(tab).classList.add('active');
            }
        });
        
        // ===== MODAL FUNCTIONS =====
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            const forms = document.querySelectorAll(`#${modalId} form`);
            forms.forEach(form => form.reset());
            const hiddenIds = document.querySelectorAll(`#${modalId} input[type="hidden"]`);
            hiddenIds.forEach(input => input.value = '');
            const previews = document.querySelectorAll('.photo-preview');
            previews.forEach(p => p.innerHTML = '');
            currentProjectPoster = '';
            currentPhotos = [];
        }
        
        window.openModal = openModal;
        window.closeModal = closeModal;
        
        // Close modal on outside click
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal')) {
                e.target.classList.remove('active');
            }
        });
        
        // ===== RENDER FUNCTIONS =====
        function renderProductions() {
            const grid = document.getElementById('productionsGrid');
            
            if (storage.projects.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎭</div>
                        <h3>Henüz Oyun Yok</h3>
                        <p>Yeni bir oyun ekleyerek başlayın</p>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = storage.projects.map(project => {
                const poster = storage.projectPosters[project.id];
                const pendingCount = countPendingTasks(project.id);
                return `
                <div class="production-card" onclick="showProductionDetail('${project.id}')">
                    <div class="production-poster">
                        ${poster ? `<img src="${poster}" alt="${project.title}" loading="lazy">` : '🎭'}
                    </div>
                    <div class="production-card-content">
                        <h3>${project.title}</h3>
                        
                        <div class="production-meta">
                            ${project.stage ? `
                            <div class="production-meta-item">
                                <strong>Sahne:</strong> ${project.stage}
                            </div>` : ''}
                            ${project.premiere ? `
                            <div class="production-meta-item">
                                <strong>Prömiyér:</strong> ${new Date(project.premiere).toLocaleDateString('tr-TR')}
                            </div>` : ''}
                            ${project.designer ? `
                            <div class="production-meta-item">
                                <strong>Tasarımcı:</strong> ${project.designer}
                            </div>` : ''}
                        </div>
                        
                        ${pendingCount > 0 ? `
                        <div class="pending-tasks-badge">
                            📋 ${pendingCount} Yapılacak İş
                        </div>` : ''}
                        
                        <div class="production-actions" onclick="event.stopPropagation()">
                            <button class="btn-small" onclick="editProject('${project.id}')">Düzenle</button>
                            <button class="btn-small btn-delete" onclick="deleteProject('${project.id}')">Sil</button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }
        
        function renderProductionDetail(project) {
            const poster = storage.projectPosters[project.id];
            
            document.getElementById('productionDetailHeader').innerHTML = `
                <div class="production-detail-poster">
                    ${poster ? `<img src="${poster}" alt="${project.title}" loading="lazy">` : '🎭'}
                </div>
                <div class="production-detail-info">
                    <h2>${project.title}</h2>
                    
                    <div class="meta-grid">
                        ${project.stage ? `<div class="meta-item"><label>Sahne</label><value>${project.stage}</value></div>` : ''}
                        ${project.premiere ? `<div class="meta-item"><label>Prömiyér</label><value>${new Date(project.premiere).toLocaleDateString('tr-TR')}</value></div>` : ''}
                        ${project.designer ? `<div class="meta-item"><label>Tasarımcı</label><value>${project.designer}</value></div>` : ''}
                    </div>
                </div>
            `;
        }
        
        function countPendingTasks(projectId) {
            return storage.workshops.filter(w => 
                w.projectId == projectId && 
                (w.status === 'Beklemede' || w.status === 'Devam Ediyor')
            ).length;
        }
        
        function renderAllWorkshops() {
            const categories = ['Demir', 'Marangoz', 'Bezleme', 'Butafor', 'Boya'];
            categories.forEach(category => renderWorkshopCategory(category));
        }
        
        function renderWorkshopCategory(category) {
            const list = document.getElementById(category.toLowerCase() + 'List');
            const workshops = storage.workshops.filter(w => 
                w.projectId == currentProject && w.workshop === category
            );
            
            if (workshops.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔨</div>
                        <h3>Henüz ${category} İşi Yok</h3>
                        <p>Yeni iş ekleyin</p>
                    </div>
                `;
                return;
            }
            
            const statusTexts = {
                'Beklemede': 'Beklemede',
                'Devam Ediyor': 'Devam Ediyor',
                'Tamamlandı': 'Tamamlandı'
            };
            
            const statusClasses = {
                'Beklemede': 'workshop-status-beklemede',
                'Devam Ediyor': 'workshop-status-devam',
                'Tamamlandı': 'workshop-status-tamamlandi'
            };
            
            list.innerHTML = workshops.map(item => {
                const photos = storage.workshopPhotos[item.id] || [];
                return `
                <div class="workshop-item">
                    <h4>${item.title}</h4>
                    <span class="workshop-status-badge ${statusClasses[item.status || 'Beklemede']}">${statusTexts[item.status || 'Beklemede']}</span>
                    
                    <div class="workshop-meta">
                        <span>📅 Teslim: ${item.deadline ? new Date(item.deadline).toLocaleDateString('tr-TR') : '-'}</span>
                    </div>
                    ${item.description ? `<p style="margin-top: 10px; color: var(--text-secondary);">${item.description}</p>` : ''}
                    
                    ${photos.length > 0 ? `
                    <div class="workshop-photos">
                        ${photos.map((photo, idx) => `
                            <div class="workshop-photo" onclick="viewPhoto('${photo}')">
                                <img src="${photo}" alt="Fotoğraf ${idx + 1}" loading="lazy">
                            </div>
                        `).join('')}
                    </div>` : ''}
                    
                    <div class="workshop-actions">
                        <button class="btn-small" onclick="editWorkshop('${item.id}')">Düzenle</button>
                        <button class="btn-small btn-delete" onclick="deleteWorkshop('${item.id}')">Sil</button>
                    </div>
                </div>
            `}).join('');
        }
        
        function renderProcurements() {
            const list = document.getElementById('procurementList');
            const procurements = storage.procurements.filter(p => p.projectId == currentProject);
            
            if (procurements.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <h3>Henüz Satınalma Yok</h3>
                        <p>Yeni satınalma ekleyin</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = procurements.map(item => `
                <div class="workshop-item">
                    <h4>${item.name}</h4>
                    <div class="workshop-meta">
                        <span>📦 Miktar: ${item.quantity}</span>
                        <span>🏪 Tedarikçi: ${item.supplier || '-'}</span>
                        <span>📅 Teslim: ${item.deadline ? new Date(item.deadline).toLocaleDateString('tr-TR') : '-'}</span>
                    </div>
                    <p style="margin-top: 10px; color: var(--text-secondary);">Durum: ${item.status}</p>
                    <div class="workshop-actions">
                        <button class="btn-small" onclick="editProcurement('${item.id}')">Düzenle</button>
                        <button class="btn-small btn-delete" onclick="deleteProcurement('${item.id}')">Sil</button>
                    </div>
                </div>
            `).join('');
        }
        
        function renderFiles() {
            const list = document.getElementById('filesList');
            const files = storage.files.filter(f => f.projectId == currentProject);
            
            if (files.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <h3>Henüz Dosya Yok</h3>
                        <p>Yeni dosya ekleyin</p>
                    </div>
                `;
                return;
            }
            
            list.innerHTML = files.map(item => `
                <div class="file-card">
                    <h4>${item.fileName}</h4>
                    <p style="color: var(--text-secondary); font-size: 0.9em;">Kategori: ${item.category}</p>
                    ${item.notes ? `<p style="margin-top: 8px; color: var(--text-secondary);">${item.notes}</p>` : ''}
                    ${item.tags ? `
                    <div class="file-tags">
                        ${item.tags.split(',').map(tag => `<span class="file-tag">${tag.trim()}</span>`).join('')}
                    </div>` : ''}
                    <div class="workshop-actions" style="margin-top: 12px;">
                        <button class="btn-small" onclick="editFile('${item.id}')">Düzenle</button>
                        <button class="btn-small btn-delete" onclick="deleteFile('${item.id}')">Sil</button>
                    </div>
                </div>
            `).join('');
        }
        
        function viewPhoto(photoSrc) {
            const modal = document.getElementById('photoViewerModal');
            if (modal) {
                document.getElementById('photoViewerImage').src = photoSrc;
                openModal('photoViewerModal');
            }
        }
        
        window.viewPhoto = viewPhoto;
        
        // Initialize theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            renderProductions();
        });
        
        // Placeholder functions for CRUD operations
        window.editProject = function(id) { console.log('Edit project:', id); };
        window.deleteProject = function(id) { console.log('Delete project:', id); };
        window.editWorkshop = function(id) { console.log('Edit workshop:', id); };
        window.deleteWorkshop = function(id) { console.log('Delete workshop:', id); };
        window.editProcurement = function(id) { console.log('Edit procurement:', id); };
        window.deleteProcurement = function(id) { console.log('Delete procurement:', id); };
        window.editFile = function(id) { console.log('Edit file:', id); };
        window.deleteFile = function(id) { console.log('Delete file:', id); };
        window.openAddWorkshopModal = function(type) { console.log('Add workshop:', type); };
    </script>
</body>
</html>
