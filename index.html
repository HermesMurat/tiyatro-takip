<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sahne Üretim Takip Sistemi - Profesyonel Tiyatro Prodüksiyon Yönetim">
    <title>Sahne Üretim Takip Sistemi</title>
    
    <!-- Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s ease-out, color 0.3s ease-out;
        }

        /* ===== CSS VARIABLES ===== */
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --primary-light: #a78bfa;
            --bg-main: #fafafa;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #efefef;
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --border: #d2d2d7;
            --success: #34c759;
            --success-light: #e8f5e9;
            --warning: #ff9500;
            --warning-light: #fff3e0;
            --info: #007aff;
            --info-light: #e3f2fd;
            --danger: #ff3b30;
            --danger-light: #ffebee;
            --shadow: rgba(0, 0, 0, 0.05);
            --overlay: rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] {
            --primary: #a78bfa;
            --primary-dark: #9333ea;
            --primary-light: #c4b5fd;
            --bg-main: #1c1c1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --text-primary: #f5f5f7;
            --text-secondary: #98989d;
            --border: #38383a;
            --success: #30d158;
            --success-light: #1e3a28;
            --warning: #ff9f0a;
            --warning-light: #3d2f1f;
            --info: #0a84ff;
            --info-light: #1e2b3d;
            --danger: #ff453a;
            --danger-light: #3d1f1f;
            --shadow: rgba(0, 0, 0, 0.3);
            --overlay: rgba(0, 0, 0, 0.6);
        }

        /* ===== LAYOUT ===== */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ===== HEADER ===== */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1em;
            color: var(--text-secondary);
        }

        .theme-toggle {
            position: absolute;
            top: 40px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease-out, border-color 0.2s ease-out;
        }

        .theme-toggle:hover {
            background: var(--bg-tertiary);
        }

        /* ===== VIEW MANAGEMENT ===== */
        .view {
            display: none;
        }

        .view.active {
            display: block;
        }

        /* ===== BUTTONS ===== */
        .btn {
            padding: 10px 24px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease-out;
            border-radius: 8px;
        }

        .btn:hover {
            background: var(--bg-secondary);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border: none;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-small {
            padding: 8px 14px;
            font-size: 0.85em;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-main);
            color: var(--text-primary);
            cursor: pointer;
            transition: background-color 0.2s ease-out;
            font-weight: 500;
        }

        .btn-small:hover {
            background: var(--bg-secondary);
        }

        .btn-delete {
            color: var(--danger);
            border-color: var(--danger-light);
        }

        .btn-delete:hover {
            background: var(--danger-light);
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease-out, border-color 0.2s ease-out;
            margin-bottom: 20px;
        }

        .back-button:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary);
        }

        /* ===== PRODUCTION CARDS ===== */
        .productions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .production-card {
            background: var(--bg-main);
            border: 2px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.3s ease-out, box-shadow 0.3s ease-out, border-color 0.3s ease-out;
            box-shadow: 0 2px 12px var(--shadow);
            cursor: pointer;
        }

        .production-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow);
            border-color: var(--primary);
        }

        .production-poster {
            width: 100%;
            height: 400px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            color: var(--text-secondary);
            border-bottom: 2px solid var(--border);
            overflow: hidden;
        }

        .production-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .production-card-content {
            padding: 24px;
        }

        .production-card h3 {
            font-size: 1.6em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .production-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .production-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95em;
            color: var(--text-secondary);
        }

        .production-meta-item strong {
            color: var(--text-primary);
            min-width: 90px;
        }

        .pending-tasks-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            background: var(--info-light);
            color: var(--info);
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95em;
            margin-top: 12px;
        }

        .production-actions {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        /* ===== PRODUCTION DETAIL ===== */
        .production-detail-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 16px;
            padding: 32px;
            color: white;
            margin-bottom: 30px;
            display: flex;
            gap: 32px;
            align-items: flex-start;
        }

        .production-detail-poster {
            width: 200px;
            height: 280px;
            border-radius: 12px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            flex-shrink: 0;
            border: 3px solid var(--border);
            overflow: hidden;
        }

        .production-detail-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 9px;
        }

        .production-detail-info {
            flex: 1;
        }

        .production-detail-info h2 {
            font-size: 2.2em;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .production-detail-info .meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .meta-item {
            background: var(--bg-tertiary);
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .meta-item label {
            font-size: 0.85em;
            opacity: 0.8;
            display: block;
            margin-bottom: 4px;
        }

        .meta-item value {
            font-size: 1.1em;
            font-weight: 600;
        }

        /* ===== TABS ===== */
        .production-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 0;
            flex-wrap: wrap;
            overflow-x: auto;
        }

        .production-tab {
            padding: 12px 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s ease-out;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            white-space: nowrap;
        }

        .production-tab:hover {
            color: var(--text-primary);
        }

        .production-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .production-tab-content {
            display: none;
        }

        .production-tab-content.active {
            display: block;
        }

        /* ===== WORKSHOP ITEMS ===== */
        .workshop-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .workshop-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            transition: box-shadow 0.2s ease-out;
        }

        .workshop-item:hover {
            box-shadow: 0 4px 12px var(--shadow);
        }

        .workshop-item h4 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .workshop-status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .workshop-status-beklemede {
            background: var(--warning-light);
            color: var(--warning);
        }

        .workshop-status-devam {
            background: var(--info-light);
            color: var(--info);
        }

        .workshop-status-tamamlandi {
            background: var(--success-light);
            color: var(--success);
        }

        .workshop-meta {
            display: flex;
            gap: 16px;
            font-size: 0.9em;
            color: var(--text-secondary);
            margin: 12px 0;
        }

        .workshop-photos {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .workshop-photo {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid var(--border);
            transition: transform 0.2s ease-out;
        }

        .workshop-photo:hover {
            transform: scale(1.05);
        }

        .workshop-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .workshop-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-main);
            border-radius: 16px;
            padding: 32px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5em;
            color: var(--text-secondary);
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: background-color 0.2s ease-out, color 0.2s ease-out;
            border: none;
            background: transparent;
        }

        .close-modal:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .modal h2 {
            font-size: 1.5em;
            font-weight: 600;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        /* ===== FORMS ===== */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95em;
            transition: border-color 0.2s ease-out, box-shadow 0.2s ease-out;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .file-upload {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s ease-out, background-color 0.2s ease-out;
            background: var(--bg-secondary);
        }

        .file-upload:hover {
            border-color: var(--primary);
            background: var(--bg-tertiary);
        }

        .file-upload input[type="file"] {
            display: none;
        }

        .photo-preview {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .photo-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .photo-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .photo-preview-item .remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--danger);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            border: none;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 4em;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state h3 {
            font-size: 1.3em;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        /* ===== FILE CARDS ===== */
        .file-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            transition: box-shadow 0.2s ease-out;
        }

        .file-card:hover {
            box-shadow: 0 4px 12px var(--shadow);
        }

        .file-card h4 {
            font-size: 1.2em;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .file-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .file-tag {
            padding: 4px 12px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 0.85em;
            color: var(--text-primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .productions-grid { grid-template-columns: 1fr; }
            .production-detail-header { flex-direction: column; }
            .production-detail-poster { width: 100%; height: 300px; }
            .production-tabs { overflow-x: auto; }
            .theme-toggle { position: static; margin-top: 16px; }
            .modal-content { width: 95%; padding: 24px; }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>SAHNE ÜRETİM TAKİP</h1>
            <p>Tiyatro Prodüksiyon Yönetim Sistemi</p>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span id="themeIcon">🌙</span>
                <span id="themeText">Karanlık Mod</span>
            </div>
        </header>
        
        <!-- Main View: Productions List -->
        <div id="mainView" class="view active">
            <div style="margin-bottom: 24px;">
                <button class="btn btn-primary" onclick="openModal('projectModal')">
                    <span>+ Yeni Oyun Ekle</span>
                </button>
            </div>
            
            <div class="productions-grid" id="productionsGrid"></div>
        </div>
        
        <!-- Production Detail View -->
        <div id="productionDetailView" class="view">
            <button class="back-button" onclick="goToMainView()">
                ← Ana Sayfaya Dön
            </button>
            
            <div class="production-detail-header" id="productionDetailHeader">
                <!-- Will be populated dynamically -->
            </div>
            
            <div class="production-tabs">
                <button class="production-tab active" data-tab="demir">🔩 Demir</button>
                <button class="production-tab" data-tab="marangoz">🪵 Marangoz</button>
                <button class="production-tab" data-tab="bezleme">🧵 Bezleme</button>
                <button class="production-tab" data-tab="butafor">🎨 Butafor</button>
                <button class="production-tab" data-tab="boya">🖌️ Boya</button>
                <button class="production-tab" data-tab="procurement">🛒 Satınalma</button>
                <button class="production-tab" data-tab="files">📁 Dosyalar</button>
            </div>
            
            <!-- Demir Tab -->
            <div id="demir" class="production-tab-content active">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Demir')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="demirList"></div>
            </div>
            
            <!-- Marangoz Tab -->
            <div id="marangoz" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Marangoz')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="marangozList"></div>
            </div>
            
            <!-- Bezleme Tab -->
            <div id="bezleme" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Bezleme')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="bezlemeList"></div>
            </div>
            
            <!-- Butafor Tab -->
            <div id="butafor" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Butafor')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="butaforList"></div>
            </div>
            
            <!-- Boya Tab -->
            <div id="boya" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openAddWorkshopModal('Boya')">
                        <span>+ İş Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="boyaList"></div>
            </div>
            
            <!-- Procurement Tab -->
            <div id="procurement" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openModal('procurementModal')">
                        <span>+ Satınalma Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="procurementList"></div>
            </div>
            
            <!-- Files Tab -->
            <div id="files" class="production-tab-content">
                <div style="margin-bottom: 20px;">
                    <button class="btn btn-primary" onclick="openModal('fileModal')">
                        <span>+ Dosya Ekle</span>
                    </button>
                </div>
                <div class="workshop-list" id="filesList"></div>
            </div>
        </div>
    </div>

    <!-- Project Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('projectModal')">&times;</span>
            <h2>Yeni Oyun Ekle</h2>
            
            <form id="projectForm" onsubmit="handleAddProject(event)">
                <input type="hidden" name="id" id="projectId">
                
                <div class="form-group">
                    <label>Oyun Adı *</label>
                    <input type="text" name="title" id="projectTitle" required>
                </div>
                
                <div class="form-group">
                    <label>Sahne</label>
                    <input type="text" name="stage" id="projectStage">
                </div>
                
                <div class="form-group">
                    <label>Prömiyér Tarihi</label>
                    <input type="date" name="premiere" id="projectPremiere">
                </div>
                
                <div class="form-group">
                    <label>Tasarımcı</label>
                    <input type="text" name="designer" id="projectDesigner">
                </div>
                
                <div class="form-group">
                    <label>Poster Görseli</label>
                    <div class="file-upload" onclick="document.getElementById('projectPosterInput').click()">
                        <div id="projectPosterPreview"></div>
                        <div id="projectPosterPlaceholder" style="text-align: center; color: var(--text-secondary);">
                            📸 Görsel seçmek için tıklayın
                        </div>
                    </div>
                    <input type="file" id="projectPosterInput" accept="image/*" style="display: none;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Kaydet</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Workshop Modal -->
    <div id="workshopModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('workshopModal')">&times;</span>
            <h2>İş Ekle</h2>
            
            <form id="workshopForm" onsubmit="handleAddWorkshop(event)">
                <input type="hidden" name="id" id="workshopId">
                <input type="hidden" name="projectId" id="workshopProjectId">
                <input type="hidden" name="workshop" id="workshopType">
                
                <div class="form-group">
                    <label>İş Başlığı *</label>
                    <input type="text" name="title" id="workshopTitle" required>
                </div>
                
                <div class="form-group">
                    <label>Açıklama</label>
                    <textarea name="description" id="workshopDescription"></textarea>
                </div>
                
                <div class="form-group">
                    <label>Teslim Tarihi</label>
                    <input type="date" name="deadline" id="workshopDeadline">
                </div>
                
                <div class="form-group">
                    <label>Durum</label>
                    <select name="status" id="workshopStatus">
                        <option value="Beklemede">Beklemede</option>
                        <option value="Devam Ediyor">Devam Ediyor</option>
                        <option value="Tamamlandı">Tamamlandı</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Fotoğraflar</label>
                    <div class="file-upload" onclick="document.getElementById('workshopPhotos').click()">
                        <div style="text-align: center; color: var(--text-secondary);">
                            📷 Fotoğraf seçmek için tıklayın
                        </div>
                    </div>
                    <div id="workshopPhotoPreview" class="photo-preview"></div>
                    <input type="file" id="workshopPhotos" accept="image/*" multiple style="display: none;">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Kaydet</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Procurement Modal -->
    <div id="procurementModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('procurementModal')">&times;</span>
            <h2>Satınalma Ekle</h2>
            
            <form id="procurementForm" onsubmit="handleAddProcurement(event)">
                <input type="hidden" name="id" id="procurementId">
                <input type="hidden" name="projectId" id="procurementProjectId">
                
                <div class="form-group">
                    <label>Ürün Adı *</label>
                    <input type="text" name="name" id="procurementName" required>
                </div>
                
                <div class="form-group">
                    <label>Miktar</label>
                    <input type="text" name="quantity" id="procurementQuantity" required>
                </div>
                
                <div class="form-group">
                    <label>Tedarikçi</label>
                    <input type="text" name="supplier" id="procurementSupplier">
                </div>
                
                <div class="form-group">
                    <label>Durum</label>
                    <select name="status" id="procurementStatus">
                        <option value="Sipariş Verildi">Sipariş Verildi</option>
                        <option value="Yolda">Yolda</option>
                        <option value="Teslim Alındı">Teslim Alındı</option>
                        <option value="Beklemede">Beklemede</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Teslim Tarihi</label>
                    <input type="date" name="deadline" id="procurementDeadline">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Kaydet</span>
                </button>
            </form>
        </div>
    </div>

    <!-- File Modal -->
    <div id="fileModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('fileModal')">&times;</span>
            <h2>Dosya Ekle</h2>
            
            <form id="fileForm" onsubmit="handleAddFile(event)">
                <input type="hidden" name="id" id="fileId">
                <input type="hidden" name="projectId" id="fileProjectId">
                
                <div class="form-group">
                    <label>Dosya Adı *</label>
                    <input type="text" name="fileName" id="fileName" required>
                </div>
                
                <div class="form-group">
                    <label>Kategori</label>
                    <select name="category" id="fileCategory">
                        <option value="Teknik Çizim">Teknik Çizim</option>
                        <option value="Maket">Maket</option>
                        <option value="Kostüm Tasarımı">Kostüm Tasarımı</option>
                        <option value="Işık Planı">Işık Planı</option>
                        <option value="Diğer">Diğer</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Etiketler (virgülle ayırın)</label>
                    <input type="text" name="tags" id="fileTags" placeholder="örn: sahne, dekor, ölçekli">
                </div>
                
                <div class="form-group">
                    <label>Notlar</label>
                    <textarea name="notes" id="fileNotes"></textarea>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <span>Kaydet</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Photo Viewer Modal -->
    <div id="photoViewerModal" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <span class="close-modal" onclick="closeModal('photoViewerModal')">&times;</span>
            <img id="photoViewerImage" style="width: 100%; border-radius: 8px;">
        </div>
    </div>

    <script>
        // ===== STATE =====
        let currentProject = null;
        let currentProjectPoster = '';
        let currentPhotos = [];
        let currentTheme = localStorage.getItem('theme') || 'light';
        let currentWorkshopType = '';

        // ===== DATA STORAGE =====
        const storage = {
            projects: JSON.parse(localStorage.getItem('projects')) || [],
            workshops: JSON.parse(localStorage.getItem('workshops')) || [],
            procurements: JSON.parse(localStorage.getItem('procurements')) || [],
            files: JSON.parse(localStorage.getItem('files')) || [],
            workshopPhotos: JSON.parse(localStorage.getItem('workshopPhotos')) || {},
            projectPosters: JSON.parse(localStorage.getItem('projectPosters')) || {}
        };

        // ===== SAVE TO STORAGE =====
        function saveStorage() {
            localStorage.setItem('projects', JSON.stringify(storage.projects));
            localStorage.setItem('workshops', JSON.stringify(storage.workshops));
            localStorage.setItem('procurements', JSON.stringify(storage.procurements));
            localStorage.setItem('files', JSON.stringify(storage.files));
            localStorage.setItem('workshopPhotos', JSON.stringify(storage.workshopPhotos));
            localStorage.setItem('projectPosters', JSON.stringify(storage.projectPosters));
        }

        // ===== THEME MANAGEMENT =====
        function initTheme() {
            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').textContent = '☀️';
                document.getElementById('themeText').textContent = 'Aydınlık Mod';
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('themeIcon').textContent = '🌙';
                document.getElementById('themeText').textContent = 'Karanlık Mod';
            }
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', currentTheme);
            document.getElementById('themeIcon').textContent = currentTheme === 'dark' ? '☀️' : '🌙';
            document.getElementById('themeText').textContent = currentTheme === 'dark' ? 'Aydınlık Mod' : 'Karanlık Mod';
            localStorage.setItem('theme', currentTheme);
        }

        // ===== VIEW NAVIGATION =====
        function goToMainView() {
            currentProject = null;
            document.getElementById('mainView').classList.add('active');
            document.getElementById('productionDetailView').classList.remove('active');
            renderProductions();
        }

        function showProductionDetail(projectId) {
            const project = storage.projects.find(p => p.id == projectId);
            if (!project) return;

            currentProject = projectId;

            document.getElementById('mainView').classList.remove('active');
            document.getElementById('productionDetailView').classList.add('active');

            renderProductionDetail(project);
            renderAllWorkshops();
            renderProcurements();
            renderFiles();

            document.querySelectorAll('.production-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.production-tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector('.production-tab[data-tab="demir"]').classList.add('active');
            document.getElementById('demir').classList.add('active');
        }

        // ===== TAB SWITCHING =====
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('production-tab')) {
                const tab = e.target.dataset.tab;
                document.querySelectorAll('.production-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.production-tab-content').forEach(c => c.classList.remove('active'));
                e.target.classList.add('active');
                document.getElementById(tab).classList.add('active');
            }
        });

        // ===== MODAL FUNCTIONS =====
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
            const forms = document.querySelectorAll(`#${modalId} form`);
            forms.forEach(form => form.reset());
            const hiddenIds = document.querySelectorAll(`#${modalId} input[type="hidden"]`);
            hiddenIds.forEach(input => input.value = '');
            const previews = document.querySelectorAll('.photo-preview');
            previews.forEach(p => p.innerHTML = '');
            currentProjectPoster = '';
            currentPhotos = [];
        }

        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });

        // ===== PHOTO UPLOAD =====
        document.getElementById('projectPosterInput').addEventListener('change', function(e) {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentProjectPoster = e.target.result;
                    document.getElementById('projectPosterPreview').innerHTML = `
                        <div class="photo-preview-item">
                            <img src="${currentProjectPoster}">
                            <span class="remove" onclick="removeProjectPoster()">×</span>
                        </div>
                    `;
                    document.getElementById('projectPosterPlaceholder').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        function removeProjectPoster() {
            currentProjectPoster = '';
            document.getElementById('projectPosterPreview').innerHTML = '';
            document.getElementById('projectPosterInput').value = '';
            document.getElementById('projectPosterPlaceholder').style.display = 'block';
        }

        document.getElementById('workshopPhotos').addEventListener('change', function(e) {
            const files = Array.from(this.files);
            files.forEach((file) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentPhotos.push(e.target.result);
                    renderWorkshopPhotoPreview();
                };
                reader.readAsDataURL(file);
            });
        });

        function removeWorkshopPhoto(index) {
            currentPhotos.splice(index, 1);
            renderWorkshopPhotoPreview();
        }

        function renderWorkshopPhotoPreview() {
            const preview = document.getElementById('workshopPhotoPreview');
            preview.innerHTML = currentPhotos.map((photo, index) => `
                <div class="photo-preview-item">
                    <img src="${photo}">
                    <span class="remove" onclick="removeWorkshopPhoto(${index})">×</span>
                </div>
            `).join('');
        }

        function viewPhoto(photoSrc) {
            document.getElementById('photoViewerImage').src = photoSrc;
            openModal('photoViewerModal');
        }

        // ===== FORM HANDLERS =====
        function handleAddProject(e) {
            e.preventDefault();
            const title = document.getElementById('projectTitle').value;
            const stage = document.getElementById('projectStage').value;
            const premiere = document.getElementById('projectPremiere').value;
            const designer = document.getElementById('projectDesigner').value;

            if (!title.trim()) return;

            const project = {
                id: Date.now().toString(),
                title,
                stage,
                premiere,
                designer,
                createdAt: new Date().toISOString()
            };

            storage.projects.push(project);
            if (currentProjectPoster) {
                storage.projectPosters[project.id] = currentProjectPoster;
            }
            saveStorage();
            closeModal('projectModal');
            renderProductions();
        }

        function handleAddWorkshop(e) {
            e.preventDefault();
            const title = document.getElementById('workshopTitle').value;
            const description = document.getElementById('workshopDescription').value;
            const deadline = document.getElementById('workshopDeadline').value;
            const status = document.getElementById('workshopStatus').value;

            if (!title.trim()) return;

            const workshop = {
                id: Date.now().toString(),
                projectId: currentProject,
                workshop: currentWorkshopType,
                title,
                description,
                deadline,
                status,
                createdAt: new Date().toISOString()
            };

            storage.workshops.push(workshop);
            if (currentPhotos.length > 0) {
                storage.workshopPhotos[workshop.id] = currentPhotos;
            }
            saveStorage();
            closeModal('workshopModal');
            renderWorkshopCategory(currentWorkshopType);
        }

        function handleAddProcurement(e) {
            e.preventDefault();
            const name = document.getElementById('procurementName').value;
            const quantity = document.getElementById('procurementQuantity').value;
            const supplier = document.getElementById('procurementSupplier').value;
            const status = document.getElementById('procurementStatus').value;
            const deadline = document.getElementById('procurementDeadline').value;

            if (!name.trim()) return;

            const procurement = {
                id: Date.now().toString(),
                projectId: currentProject,
                name,
                quantity,
                supplier,
                status,
                deadline,
                createdAt: new Date().toISOString()
            };

            storage.procurements.push(procurement);
            saveStorage();
            closeModal('procurementModal');
            renderProcurements();
        }

        function handleAddFile(e) {
            e.preventDefault();
            const fileName = document.getElementById('fileName').value;
            const category = document.getElementById('fileCategory').value;
            const tags = document.getElementById('fileTags').value;
            const notes = document.getElementById('fileNotes').value;

            if (!fileName.trim()) return;

            const file = {
                id: Date.now().toString(),
                projectId: currentProject,
                fileName,
                category,
                tags,
                notes,
                createdAt: new Date().toISOString()
            };

            storage.files.push(file);
            saveStorage();
            closeModal('fileModal');
            renderFiles();
        }

        function openAddWorkshopModal(type) {
            currentWorkshopType = type;
            document.getElementById('workshopType').value = type;
            document.getElementById('workshopProjectId').value = currentProject;
            currentPhotos = [];
            document.getElementById('workshopPhotoPreview').innerHTML = '';
            openModal('workshopModal');
        }

        // ===== RENDER FUNCTIONS =====
        function renderProductions() {
            const grid = document.getElementById('productionsGrid');

            if (storage.projects.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎭</div>
                        <h3>Henüz Oyun Yok</h3>
                        <p>Yeni bir oyun ekleyerek başlayın</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = storage.projects.map(project => {
                const poster = storage.projectPosters[project.id];
                const pendingCount = storage.workshops.filter(w =>
                    w.projectId == project.id &&
                    (w.status === 'Beklemede' || w.status === 'Devam Ediyor')
                ).length;

                return `
                <div class="production-card" onclick="showProductionDetail('${project.id}')">
                    <div class="production-poster">
                        ${poster ? `<img src="${poster}" alt="${project.title}" loading="lazy">` : '🎭'}
                    </div>
                    <div class="production-card-content">
                        <h3>${project.title}</h3>

                        <div class="production-meta">
                            ${project.stage ? `
                            <div class="production-meta-item">
                                <strong>Sahne:</strong> ${project.stage}
                            </div>` : ''}
                            ${project.premiere ? `
                            <div class="production-meta-item">
                                <strong>Prömiyér:</strong> ${new Date(project.premiere).toLocaleDateString('tr-TR')}
                            </div>` : ''}
                            ${project.designer ? `
                            <div class="production-meta-item">
                                <strong>Tasarımcı:</strong> ${project.designer}
                            </div>` : ''}
                        </div>

                        ${pendingCount > 0 ? `
                        <div class="pending-tasks-badge">
                            📋 ${pendingCount} Yapılacak İş
                        </div>` : ''}

                        <div class="production-actions" onclick="event.stopPropagation()">
                            <button class="btn-small" onclick="editProject('${project.id}')">Düzenle</button>
                            <button class="btn-small btn-delete" onclick="deleteProject('${project.id}')">Sil</button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderProductionDetail(project) {
            const poster = storage.projectPosters[project.id];

            document.getElementById('productionDetailHeader').innerHTML = `
                <div class="production-detail-poster">
                    ${poster ? `<img src="${poster}" alt="${project.title}" loading="lazy">` : '🎭'}
                </div>
                <div class="production-detail-info">
                    <h2>${project.title}</h2>

                    <div class="meta-grid">
                        ${project.stage ? `<div class="meta-item"><label>Sahne</label><value>${project.stage}</value></div>` : ''}
                        ${project.premiere ? `<div class="meta-item"><label>Prömiyér</label><value>${new Date(project.premiere).toLocaleDateString('tr-TR')}</value></div>` : ''}
                        ${project.designer ? `<div class="meta-item"><label>Tasarımcı</label><value>${project.designer}</value></div>` : ''}
                    </div>
                </div>
            `;
        }

        function renderAllWorkshops() {
            const categories = ['Demir', 'Marangoz', 'Bezleme', 'Butafor', 'Boya'];
            categories.forEach(category => renderWorkshopCategory(category));
        }

        function renderWorkshopCategory(category) {
            const list = document.getElementById(category.toLowerCase() + 'List');
            const workshops = storage.workshops.filter(w =>
                w.projectId == currentProject && w.workshop === category
            );

            if (workshops.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔨</div>
                        <h3>Henüz ${category} İşi Yok</h3>
                        <p>Yeni iş ekleyin</p>
                    </div>
                `;
                return;
            }

            const statusTexts = {
                'Beklemede': 'Beklemede',
                'Devam Ediyor': 'Devam Ediyor',
                'Tamamlandı': 'Tamamlandı'
            };

            const statusClasses = {
                'Beklemede': 'workshop-status-beklemede',
                'Devam Ediyor': 'workshop-status-devam',
                'Tamamlandı': 'workshop-status-tamamlandi'
            };

            list.innerHTML = workshops.map(item => {
                const photos = storage.workshopPhotos[item.id] || [];
                return `
                <div class="workshop-item">
                    <h4>${item.title}</h4>
                    <span class="workshop-status-badge ${statusClasses[item.status || 'Beklemede']}">${statusTexts[item.status || 'Beklemede']}</span>

                    <div class="workshop-meta">
                        <span>📅 Teslim: ${item.deadline ? new Date(item.deadline).toLocaleDateString('tr-TR') : '-'}</span>
                    </div>
                    ${item.description ? `<p style="margin-top: 10px; color: var(--text-secondary);">${item.description}</p>` : ''}

                    ${photos.length > 0 ? `
                    <div class="workshop-photos">
                        ${photos.map((photo, idx) => `
                            <div class="workshop-photo" onclick="viewPhoto('${photo}')">
                                <img src="${photo}" alt="Fotoğraf ${idx + 1}" loading="lazy">
                            </div>
                        `).join('')}
                    </div>` : ''}

                    <div class="workshop-actions">
                        <button class="btn-small" onclick="editWorkshop('${item.id}')">Düzenle</button>
                        <button class="btn-small btn-delete" onclick="deleteWorkshop('${item.id}')">Sil</button>
                    </div>
                </div>
            `}).join('');
        }

        function renderProcurements() {
            const list = document.getElementById('procurementList');
            const procurements = storage.procurements.filter(p => p.projectId == currentProject);

            if (procurements.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🛒</div>
                        <h3>Henüz Satınalma Yok</h3>
                        <p>Yeni satınalma ekleyin</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = procurements.map(item => `
                <div class="workshop-item">
                    <h4>📦 ${item.name}</h4>
                    <div class="workshop-meta">
                        <span>Miktar: ${item.quantity}</span>
                        <span>Tedarikçi: ${item.supplier || '-'}</span>
                        <span>📅 Teslim: ${item.deadline ? new Date(item.deadline).toLocaleDateString('tr-TR') : '-'}</span>
                    </div>
                    <p style="margin-top: 10px; color: var(--text-secondary);">Durum: ${item.status}</p>
                    <div class="workshop-actions">
                        <button class="btn-small" onclick="editProcurement('${item.id}')">Düzenle</button>
                        <button class="btn-small btn-delete" onclick="deleteProcurement('${item.id}')">Sil</button>
                    </div>
                </div>
            `).join('');
        }

        function renderFiles() {
            const list = document.getElementById('filesList');
            const files = storage.files.filter(f => f.projectId == currentProject);

            if (files.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <h3>Henüz Dosya Yok</h3>
                        <p>Yeni dosya ekleyin</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = files.map(item => `
                <div class="file-card">
                    <h4>📄 ${item.fileName}</h4>
                    <p style="color: var(--text-secondary); font-size: 0.9em;">Kategori: ${item.category}</p>
                    ${item.notes ? `<p style="margin-top: 8px; color: var(--text-secondary);">${item.notes}</p>` : ''}
                    ${item.tags ? `
                    <div class="file-tags">
                        ${item.tags.split(',').map(tag => `<span class="file-tag">${tag.trim()}</span>`).join('')}
                    </div>` : ''}
                    <div class="workshop-actions" style="margin-top: 12px;">
                        <button class="btn-small" onclick="editFile('${item.id}')">Düzenle</button>
                        <button class="btn-small btn-delete" onclick="deleteFile('${item.id}')">Sil</button>
                    </div>
                </div>
            `).join('');
        }

        // ===== DELETE FUNCTIONS =====
        function deleteProject(id) {
            if (confirm('Bu oyunu silmek istediğinize emin misiniz?')) {
                storage.projects = storage.projects.filter(p => p.id !== id);
                storage.workshops = storage.workshops.filter(w => w.projectId !== id);
                storage.procurements = storage.procurements.filter(p => p.projectId !== id);
                storage.files = storage.files.filter(f => f.projectId !== id);
                delete storage.projectPosters[id];
                saveStorage();
                renderProductions();
            }
        }

        function deleteWorkshop(id) {
            if (confirm('Bu işi silmek istediğinize emin misiniz?')) {
                storage.workshops = storage.workshops.filter(w => w.id !== id);
                delete storage.workshopPhotos[id];
                saveStorage();
                renderAllWorkshops();
            }
        }

        function deleteProcurement(id) {
            if (confirm('Bu satınalmayı silmek istediğinize emin misiniz?')) {
                storage.procurements = storage.procurements.filter(p => p.id !== id);
                saveStorage();
                renderProcurements();
            }
        }

        function deleteFile(id) {
            if (confirm('Bu dosyayı silmek istediğinize emin misiniz?')) {
                storage.files = storage.files.filter(f => f.id !== id);
                saveStorage();
                renderFiles();
            }
