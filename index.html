<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 Sahne Üretim & Tiyatro Yönetimi</title>
    <!-- Tailwind CSS (Modern ve Şık Tasarım İçin) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome (İkonlar İçin) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Tailwind Özel Renk Ayarları
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0f172a',
                        card: '#1e293b',
                        primary: '#6366f1',
                        primary_hover: '#4f46e5',
                        todo: '#f43f5e',
                        doing: '#f59e0b',
                        done: '#10b981'
                    }
                }
            }
        }
    </script>
    <style>
        /* Özel Kaydırma Çubuğu ve Animasyonlar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Drag & Drop Stilleri */
        .task-card { cursor: grab; }
        .task-card:active { cursor: grabbing; transform: scale(0.98); }
        .drag-over { background-color: rgba(99, 102, 241, 0.1); border: 2px dashed #6366f1; }

        /* Modal Arka Planı */
        dialog::backdrop { background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); }
        dialog { margin: auto; }
    </style>
</head>
<body class="bg-dark text-slate-200 font-sans min-h-screen flex flex-col">

    <!-- Üst Bar -->
    <header class="bg-card border-b border-slate-700 sticky top-0 z-10 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showDashboard()">
                <div class="bg-primary text-white p-2 rounded-lg"><i class="fa-solid fa-masks-theater text-xl"></i></div>
                <h1 class="text-xl font-bold text-white tracking-wide">Sahne Üretim</h1>
            </div>
            <div id="header-actions">
                <button onclick="document.getElementById('modal-add-prod').showModal()" class="bg-primary hover:bg-primary_hover text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-md flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Yeni Prodüksiyon
                </button>
            </div>
        </div>
    </header>

    <!-- ANA İÇERİK ALANI -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- 1. GÖRÜNÜM: PRODÜKSİYON VİTRİNİ -->
        <div id="view-dashboard" class="fade-in block">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-white">Aktif Oyunlar</h2>
            </div>
            
            <div id="productions-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Oyun Kartları Buraya Gelecek -->
            </div>
        </div>

        <!-- 2. GÖRÜNÜM: OYUN DETAYI VE YÖNETİMİ -->
        <div id="view-production" class="fade-in hidden">
            <!-- Oyun Başlığı ve Afiş Özeti -->
            <div class="relative rounded-2xl overflow-hidden bg-card mb-8 shadow-xl border border-slate-700">
                <div id="prod-banner" class="h-48 w-full bg-cover bg-center opacity-50"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-card to-transparent"></div>
                <div class="absolute bottom-0 left-0 p-6 w-full flex justify-between items-end">
                    <div>
                        <button onclick="showDashboard()" class="text-slate-300 hover:text-white mb-2 text-sm flex items-center gap-2 transition-colors">
                            <i class="fa-solid fa-arrow-left"></i> Vitrine Dön
                        </button>
                        <h2 id="current-prod-title" class="text-4xl font-extrabold text-white">Oyun Adı</h2>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="document.getElementById('modal-add-drawing').showModal()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-slate-600">
                            <i class="fa-solid fa-image"></i> Çizim/Dosya Ekle
                        </button>
                        <button onclick="document.getElementById('modal-add-task').showModal()" class="bg-primary hover:bg-primary_hover text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                            <i class="fa-solid fa-plus"></i> Atölye İşi Ekle
                        </button>
                    </div>
                </div>
            </div>

            <!-- Sekmeler (Tabs) -->
            <div class="flex border-b border-slate-700 mb-6 gap-6">
                <button onclick="switchTab('tab-kanban')" id="btn-tab-kanban" class="pb-3 text-primary border-b-2 border-primary font-medium text-lg transition-colors"><i class="fa-solid fa-hammer mr-2"></i>Atölye Panosu</button>
                <button onclick="switchTab('tab-gallery')" id="btn-tab-gallery" class="pb-3 text-slate-400 hover:text-slate-200 font-medium text-lg transition-colors border-b-2 border-transparent"><i class="fa-solid fa-palette mr-2"></i>Çizimler & Afişler</button>
            </div>

            <!-- Sekme 1: Kanban Panosu -->
            <div id="tab-kanban" class="block fade-in">
                <div class="flex flex-col lg:flex-row gap-6 overflow-x-auto pb-4">
                    
                    <!-- Yapılacaklar -->
                    <div class="flex-1 min-w-[320px] bg-slate-800/50 rounded-xl border border-slate-700 p-4 flex flex-col h-[600px]">
                        <div class="flex items-center justify-between mb-4 border-b border-todo pb-2">
                            <h3 class="font-bold text-white flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-todo"></div> Yapılacaklar</h3>
                            <span id="count-todo" class="bg-slate-700 text-xs py-1 px-2 rounded-full">0</span>
                        </div>
                        <div id="col-todo" class="flex-1 overflow-y-auto space-y-3" ondrop="drop(event, 'todo')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                    </div>

                    <!-- Üretimde -->
                    <div class="flex-1 min-w-[320px] bg-slate-800/50 rounded-xl border border-slate-700 p-4 flex flex-col h-[600px]">
                        <div class="flex items-center justify-between mb-4 border-b border-doing pb-2">
                            <h3 class="font-bold text-white flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-doing"></div> Üretimde</h3>
                            <span id="count-doing" class="bg-slate-700 text-xs py-1 px-2 rounded-full">0</span>
                        </div>
                        <div id="col-doing" class="flex-1 overflow-y-auto space-y-3" ondrop="drop(event, 'doing')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                    </div>

                    <!-- Tamamlandı -->
                    <div class="flex-1 min-w-[320px] bg-slate-800/50 rounded-xl border border-slate-700 p-4 flex flex-col h-[600px]">
                        <div class="flex items-center justify-between mb-4 border-b border-done pb-2">
                            <h3 class="font-bold text-white flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-done"></div> Tamamlandı</h3>
                            <span id="count-done" class="bg-slate-700 text-xs py-1 px-2 rounded-full">0</span>
                        </div>
                        <div id="col-done" class="flex-1 overflow-y-auto space-y-3" ondrop="drop(event, 'done')" ondragover="allowDrop(event)" ondragleave="dragLeave(event)"></div>
                    </div>

                </div>
            </div>

            <!-- Sekme 2: Çizimler ve Dosyalar Galerisi -->
            <div id="tab-gallery" class="hidden fade-in">
                <div id="gallery-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    <!-- Resimler Buraya Gelecek -->
                </div>
            </div>

        </div>
    </main>

    <!-- MODAL 1: YENİ OYUN EKLE (AFİŞLİ) -->
    <dialog id="modal-add-prod" class="bg-card border border-slate-600 rounded-2xl shadow-2xl p-0 w-full max-w-md text-slate-200">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Yeni Prodüksiyon</h3>
            <button onclick="document.getElementById('modal-add-prod').close()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <form onsubmit="addProduction(event)" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Oyun Adı *</label>
                <input type="text" id="inp-prod-name" required class="w-full bg-dark border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-primary">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Oyun Afişi (Zorunlu Değil)</label>
                <div class="border-2 border-dashed border-slate-600 rounded-lg p-4 text-center hover:border-primary transition-colors cursor-pointer relative">
                    <input type="file" id="inp-prod-poster" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="previewImage(this, 'poster-preview')">
                    <div id="poster-preview-container" class="hidden flex flex-col items-center">
                        <img id="poster-preview" class="h-32 object-contain rounded mb-2">
                        <span class="text-xs text-primary">Değiştirmek için tıkla</span>
                    </div>
                    <div id="poster-upload-text">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-slate-400 mb-2"></i>
                        <p class="text-sm text-slate-400">Afiş seçmek için tıklayın veya sürükleyin</p>
                    </div>
                </div>
            </div>
            <div class="pt-4 flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('modal-add-prod').close()" class="px-4 py-2 rounded-lg border border-slate-600 hover:bg-slate-700 transition-colors">İptal</button>
                <button type="submit" class="px-4 py-2 rounded-lg bg-primary hover:bg-primary_hover text-white font-medium transition-colors">Kaydet</button>
            </div>
        </form>
    </dialog>

    <!-- MODAL 2: ATÖLYE İŞİ EKLE -->
    <dialog id="modal-add-task" class="bg-card border border-slate-600 rounded-2xl shadow-2xl p-0 w-full max-w-md text-slate-200">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Yeni Atölye İşi</h3>
            <button onclick="document.getElementById('modal-add-task').close()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <form onsubmit="addTask(event)" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">İş Tanımı *</label>
                <input type="text" id="inp-task-name" placeholder="Örn: Sabriye'nin Maket Arabası" required class="w-full bg-dark border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-primary">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">İlgili Atölye *</label>
                <select id="inp-task-type" required class="w-full bg-dark border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-primary">
                    <option value="Marangoz|bg-amber-700|fa-tree">🪵 Marangoz Atölyesi</option>
                    <option value="Kostüm|bg-pink-600|fa-scissors">🧵 Kostüm & Bezleme</option>
                    <option value="Demir|bg-slate-500|fa-gavel">🔩 Demir Atölyesi</option>
                    <option value="Dekor|bg-emerald-600|fa-paint-roller">🎨 Dekor & Boya</option>
                </select>
            </div>
            <div class="pt-4 flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('modal-add-task').close()" class="px-4 py-2 rounded-lg border border-slate-600 hover:bg-slate-700 transition-colors">İptal</button>
                <button type="submit" class="px-4 py-2 rounded-lg bg-primary hover:bg-primary_hover text-white font-medium transition-colors">İşi Ekle</button>
            </div>
        </form>
    </dialog>

    <!-- MODAL 3: ÇİZİM / GÖRSEL EKLE -->
    <dialog id="modal-add-drawing" class="bg-card border border-slate-600 rounded-2xl shadow-2xl p-0 w-full max-w-md text-slate-200">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h3 class="text-xl font-bold text-white">Sahne Çizimi / Referans Ekle</h3>
            <button onclick="document.getElementById('modal-add-drawing').close()" class="text-slate-400 hover:text-white"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <form onsubmit="addDrawing(event)" class="p-6 space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Görsel (Zorunlu) *</label>
                <div class="border-2 border-dashed border-slate-600 rounded-lg p-4 text-center hover:border-primary transition-colors cursor-pointer relative bg-dark">
                    <input type="file" id="inp-draw-file" accept="image/*" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="previewImage(this, 'draw-preview')">
                    <div id="draw-preview-container" class="hidden flex flex-col items-center">
                        <img id="draw-preview" class="h-40 object-contain rounded mb-2">
                        <span class="text-xs text-primary">Değiştirmek için tıkla</span>
                    </div>
                    <div id="draw-upload-text">
                        <i class="fa-solid fa-file-image text-3xl text-slate-400 mb-2"></i>
                        <p class="text-sm text-slate-400">Çizimi veya fotoğrafı seçin</p>
                    </div>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Başlık / Açıklama *</label>
                <input type="text" id="inp-draw-name" placeholder="Örn: 2. Perde Dekor Taslağı" required class="w-full bg-dark border border-slate-600 rounded-lg p-3 text-white focus:outline-none focus:border-primary">
            </div>
            <div class="pt-4 flex justify-end gap-3">
                <button type="button" onclick="document.getElementById('modal-add-drawing').close()" class="px-4 py-2 rounded-lg border border-slate-600 hover:bg-slate-700 transition-colors">İptal</button>
                <button type="submit" class="px-4 py-2 rounded-lg bg-primary hover:bg-primary_hover text-white font-medium transition-colors">Yükle</button>
            </div>
        </form>
    </dialog>

    <script>
        // --- 1. VERİ TABANI (LOCAL STORAGE) VE UYGULAMA DURUMU ---
        let appData = JSON.parse(localStorage.getItem('sahnePro')) || { productions: [] };
        let activeProdId = null;

        function saveData() {
            try {
                localStorage.setItem('sahnePro', JSON.stringify(appData));
            } catch (e) {
                alert("Hafıza dolu! Tarayıcı çok fazla yüksek çözünürlüklü resim kaydetmenize izin vermiyor. Lütfen eski çizimleri silin.");
            }
        }

        // --- 2. RESİM SIKIŞTIRMA MOTORU (Tarayıcı çökmemesi için afiş ve çizimleri küçültür) ---
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    // Maksimum boyutlar (Kaliteyi koruyup boyutu düşürmek için)
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    // %70 kaliteyle JPEG'e çevir
                    callback(canvas.toDataURL('image/jpeg', 0.7));
                }
            }
        }

        // --- 3. GÖRSEL ÖNİZLEME (Modallarda resim seçilince göster) ---
        function previewImage(input, previewId) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(previewId).src = e.target.result;
                    document.getElementById(previewId + '-container').classList.remove('hidden');
                    
                    // Upload text kısmını gizle (id bulma mantığı: poster-preview -> poster-upload-text)
                    const textId = previewId.split('-')[0] + '-upload-text';
                    document.getElementById(textId).classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function resetFormImage(prefix) {
            const input = document.getElementById(`inp-${prefix}-file`) || document.getElementById(`inp-${prefix}-poster`);
            if(input) input.value = '';
            document.getElementById(`${prefix}-preview-container`).classList.add('hidden');
            document.getElementById(`${prefix}-preview`).src = '';
            document.getElementById(`${prefix}-upload-text`).classList.remove('hidden');
        }

        // --- 4. ARAYÜZ YÖNETİMİ VE RENDER ---

        // Ana Vitrini (Oyunları) Ekrana Çiz
        function renderDashboard() {
            const grid = document.getElementById('productions-grid');
            grid.innerHTML = '';

            if (appData.productions.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full bg-card border border-slate-700 rounded-xl p-10 text-center">
                        <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-folder-open text-2xl text-slate-400"></i></div>
                        <h3 class="text-xl font-bold text-white mb-2">Henüz Oyun Eklenmedi</h3>
                        <p class="text-slate-400 mb-6">Tiyatro sezonunu başlatmak için ilk prodüksiyonunuzu oluşturun.</p>
                        <button onclick="document.getElementById('modal-add-prod').showModal()" class="bg-primary hover:bg-primary_hover text-white px-6 py-2 rounded-lg font-medium transition-colors">İlk Oyunu Ekle</button>
                    </div>`;
                return;
            }

            appData.productions.forEach(prod => {
                // Afiş yoksa varsayılan bir renk gradyanı göster
                const posterBg = prod.poster ? `url(${prod.poster})` : 'linear-gradient(to right bottom, #1e293b, #0f172a)';
                const taskCount = prod.tasks ? prod.tasks.length : 0;
                const doneCount = prod.tasks ? prod.tasks.filter(t => t.status === 'done').length : 0;
                let progress = taskCount === 0 ? 0 : Math.round((doneCount / taskCount) * 100);

                grid.innerHTML += `
                    <div class="bg-card border border-slate-700 rounded-2xl overflow-hidden hover:border-primary transition-colors group cursor-pointer" onclick="openProduction(${prod.id})">
                        <div class="h-48 bg-cover bg-center relative" style="background-image: ${posterBg}">
                            <div class="absolute inset-0 bg-black bg-opacity-40 group-hover:bg-opacity-20 transition-all"></div>
                            <div class="absolute top-3 right-3 bg-dark/80 backdrop-blur text-xs font-bold px-2 py-1 rounded text-white border border-slate-600">
                                %${progress} Tamamlandı
                            </div>
                        </div>
                        <div class="p-5 relative">
                            <h3 class="text-xl font-bold text-white mb-1">${prod.name}</h3>
                            <div class="flex gap-4 text-sm text-slate-400 mt-3">
                                <span class="flex items-center gap-1"><i class="fa-solid fa-hammer"></i> ${taskCount} İş</span>
                                <span class="flex items-center gap-1"><i class="fa-solid fa-image"></i> ${prod.drawings ? prod.drawings.length : 0} Görsel</span>
                            </div>
                            <button onclick="event.stopPropagation(); deleteProd(${prod.id})" class="absolute bottom-5 right-5 text-slate-500 hover:text-todo transition-colors" title="Oyunu Sil"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        // --- 5. OYUN İÇİ EKRAN (KANBAN VE GALERİ) ---

        function openProduction(id) {
            activeProdId = id;
            const prod = appData.productions.find(p => p.id === id);
            
            document.getElementById('current-prod-title').innerText = prod.name;
            const banner = document.getElementById('prod-banner');
            banner.style.backgroundImage = prod.poster ? `url(${prod.poster})` : 'linear-gradient(to right, #312e81, #0f172a)';
            
            document.getElementById('view-dashboard').classList.add('hidden');
            document.getElementById('header-actions').classList.add('hidden');
            document.getElementById('view-production').classList.remove('hidden');
            
            // Varsayılan olarak Kanban sekmesini aç
            switchTab('tab-kanban');
            renderKanban();
            renderGallery();
        }

        function showDashboard() {
            activeProdId = null;
            document.getElementById('view-production').classList.add('hidden');
            document.getElementById('view-dashboard').classList.remove('hidden');
            document.getElementById('header-actions').classList.remove('hidden');
            renderDashboard();
        }

        function switchTab(tabId) {
            // Sekme içeriklerini gizle/göster
            document.getElementById('tab-kanban').classList.add('hidden');
            document.getElementById('tab-gallery').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');

            // Buton stillerini güncelle
            const btnKanban = document.getElementById('btn-tab-kanban');
            const btnGallery = document.getElementById('btn-tab-gallery');
            
            btnKanban.className = "pb-3 font-medium text-lg transition-colors border-b-2";
            btnGallery.className = "pb-3 font-medium text-lg transition-colors border-b-2";

            if(tabId === 'tab-kanban') {
                btnKanban.classList.add('text-primary', 'border-primary');
                btnGallery.classList.add('text-slate-400', 'hover:text-slate-200', 'border-transparent');
            } else {
                btnGallery.classList.add('text-primary', 'border-primary');
                btnKanban.classList.add('text-slate-400', 'hover:text-slate-200', 'border-transparent');
            }
        }

        // Kanban Render
        function renderKanban() {
            const prod = appData.productions.find(p => p.id === activeProdId);
            const cols = { todo: document.getElementById('col-todo'), doing: document.getElementById('col-doing'), done: document.getElementById('col-done') };
            const counts = { todo: 0, doing: 0, done: 0 };
            
            Object.values(cols).forEach(col => col.innerHTML = '');

            if(prod.tasks) {
                prod.tasks.forEach(task => {
                    counts[task.status]++;
                    const typeData = task.type.split('|'); // Örn: "Marangoz|bg-amber-700|fa-tree"
                    
                    const card = document.createElement('div');
                    card.className = "task-card bg-card p-4 rounded-lg border border-slate-600 shadow-sm hover:border-slate-500 transition-colors relative group";
                    card.draggable = true;
                    card.id = `task-${task.id}`;
                    card.ondragstart = (e) => dragStart(e, task.id);
                    
                    card.innerHTML = `
                        <h4 class="font-medium text-white mb-3 pr-6 leading-tight">${task.name}</h4>
                        <div class="flex justify-between items-center">
                            <span class="${typeData[1]} text-white text-xs px-2 py-1 rounded font-medium flex items-center gap-1"><i class="fa-solid ${typeData[2]}"></i> ${typeData[0]}</span>
                            <span class="text-xs text-slate-500 flex items-center gap-1"><i class="fa-regular fa-clock"></i> ${new Date(task.id).toLocaleDateString('tr-TR')}</span>
                        </div>
                        <button onclick="deleteTask(${task.id})" class="absolute top-3 right-3 text-slate-500 hover:text-todo opacity-0 group-hover:opacity-100 transition-opacity"><i class="fa-solid fa-trash text-sm"></i></button>
                    `;
                    cols[task.status].appendChild(card);
                });
            }

            document.getElementById('count-todo').innerText = counts.todo;
            document.getElementById('count-doing').innerText = counts.doing;
            document.getElementById('count-done').innerText = counts.done;
        }

        // Galeri Render
        function renderGallery() {
            const prod = appData.productions.find(p => p.id === activeProdId);
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            if(!prod.drawings || prod.drawings.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-slate-400">Bu prodüksiyon için henüz çizim veya referans görseli yüklenmemiş.</div>`;
                return;
            }

            prod.drawings.forEach(draw => {
                grid.innerHTML += `
                    <div class="bg-card border border-slate-700 rounded-xl overflow-hidden group">
                        <div class="h-48 w-full bg-dark flex items-center justify-center overflow-hidden cursor-pointer" onclick="window.open('${draw.image}', '_blank')">
                            <img src="${draw.image}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-300">
                        </div>
                        <div class="p-4 relative">
                            <h4 class="font-bold text-white text-sm mb-1 truncate" title="${draw.name}">${draw.name}</h4>
                            <p class="text-xs text-slate-400">${new Date(draw.id).toLocaleDateString('tr-TR')}</p>
                            <button onclick="deleteDrawing(${draw.id})" class="absolute top-4 right-4 text-slate-500 hover:text-todo transition-colors"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }


        // --- 6. EKLEME İŞLEMLERİ (Afiş, İş, Çizim) ---

        // Prodüksiyon Ekle (Afişli)
        function addProduction(e) {
            e.preventDefault();
            const name = document.getElementById('inp-prod-name').value;
            const fileInput = document.getElementById('inp-prod-poster');
            
            const createRecord = (posterBase64 = null) => {
                appData.productions.push({
                    id: Date.now(),
                    name: name,
                    poster: posterBase64,
                    tasks: [],
                    drawings: []
                });
                saveData();
                document.getElementById('inp-prod-name').value = '';
                resetFormImage('poster');
                document.getElementById('modal-add-prod').close();
                renderDashboard();
            };

            if (fileInput.files.length > 0) {
                // Afiş seçildiyse sıkıştırıp kaydet
                compressImage(fileInput.files[0], createRecord);
            } else {
                // Afişsiz kaydet
                createRecord();
            }
        }

        // İş Ekle
        function addTask(e) {
            e.preventDefault();
            const name = document.getElementById('inp-task-name').value;
            const type = document.getElementById('inp-task-type').value;

            const prod = appData.productions.find(p => p.id === activeProdId);
            if(!prod.tasks) prod.tasks = [];
            
            prod.tasks.push({ id: Date.now(), name: name, type: type, status: 'todo' });
            
            saveData();
            document.getElementById('inp-task-name').value = '';
            document.getElementById('modal-add-task').close();
            renderKanban();
        }

        // Çizim/Dosya Ekle (Görselli)
        function addDrawing(e) {
            e.preventDefault();
            const name = document.getElementById('inp-draw-name').value;
            const fileInput = document.getElementById('inp-draw-file');

            if (fileInput.files.length > 0) {
                // Görseli sıkıştırıp kaydet
                compressImage(fileInput.files[0], (base64Img) => {
                    const prod = appData.productions.find(p => p.id === activeProdId);
                    if(!prod.drawings) prod.drawings = [];
                    
                    prod.drawings.push({
                        id: Date.now(),
                        name: name,
                        image: base64Img
                    });
                    
                    saveData();
                    document.getElementById('inp-draw-name').value = '';
                    resetFormImage('draw');
                    document.getElementById('modal-add-drawing').close();
                    renderGallery();
                });
            }
        }

        // --- 7. SİLME İŞLEMLERİ ---
        function deleteProd(id) {
            if(confirm("Tüm oyun, afişleri, çizimleri ve işleri kalıcı olarak silinecek. Emin misiniz?")) {
                appData.productions = appData.productions.filter(p => p.id !== id);
                saveData(); renderDashboard();
            }
        }
        function deleteTask(id) {
            if(confirm("İşi silmek istiyor musunuz?")) {
                const prod = appData.productions.find(p => p.id === activeProdId);
                prod.tasks = prod.tasks.filter(t => t.id !== id);
                saveData(); renderKanban();
            }
        }
        function deleteDrawing(id) {
            if(confirm("Bu çizimi kalıcı olarak silmek istiyor musunuz?")) {
                const prod = appData.productions.find(p => p.id === activeProdId);
                prod.drawings = prod.drawings.filter(d => d.id !== id);
                saveData(); renderGallery();
            }
        }

        // --- 8. SÜRÜKLE BIRAK (DRAG & DROP) MANTIĞI ---
        function dragStart(ev, taskId) {
            ev.dataTransfer.setData("taskId", taskId);
            ev.target.classList.add('opacity-50');
        }

        function allowDrop(ev) {
            ev.preventDefault();
            const column = ev.target.closest('.flex-1'); // Sütunu bul
            if(column) column.classList.add('drag-over');
        }

        function dragLeave(ev) {
            const column = ev.target.closest('.flex-1');
            if(column) column.classList.remove('drag-over');
        }

        function drop(ev, newStatus) {
            ev.preventDefault();
            const column = ev.target.closest('.flex-1');
            if(column) column.classList.remove('drag-over');

            const taskId = parseInt(ev.dataTransfer.getData("taskId"));
            if(!taskId) return;

            const prod = appData.productions.find(p => p.id === activeProdId);
            const task = prod.tasks.find(t => t.id === taskId);
            
            if(task && task.status !== newStatus) {
                task.status = newStatus;
                saveData();
                renderKanban();
            } else {
                // Aynı yere bırakıldıysa sadece görseli düzelt
                renderKanban();
            }
        }

        // Uygulamayı Başlat
        renderDashboard();
    </script>
</body>
</html>
